name: Lighthouse 
on:
  workflow_dispatch:
  push:
    branches:
      - 'inertia'
jobs:
  run_lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup node
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
      - name: Lighthouse Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://rf26.colby.edu/
          configPath: '.github/.lighthouserc.json'
          uploadArtifacts: true # Upload reports to GitHub Actions
